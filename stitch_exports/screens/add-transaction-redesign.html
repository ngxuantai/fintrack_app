<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#6c7b6d",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#dcd9d9",
                    "surface-container-highest": "#e5e2e1",
                    "secondary": "#006d37",
                    "on-error": "#ffffff",
                    "background": "#fcf9f8",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed-variant": "#005228",
                    "inverse-on-surface": "#f3f0ef",
                    "primary-container": "#2ecc71",
                    "primary-fixed-dim": "#4ae183",
                    "primary": "#006d37",
                    "on-secondary-container": "#007239",
                    "tertiary-fixed-dim": "#ffb59d",
                    "surface-variant": "#e5e2e1",
                    "surface-tint": "#006d37",
                    "on-primary": "#ffffff",
                    "on-primary-fixed-variant": "#005228",
                    "tertiary": "#98472a",
                    "surface-bright": "#fcf9f8",
                    "on-secondary-fixed": "#00210c",
                    "error": "#ba1a1a",
                    "surface-container": "#f0edec",
                    "surface": "#fcf9f8",
                    "on-tertiary-fixed": "#390c00",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed-variant": "#793015",
                    "on-tertiary-container": "#772e14",
                    "secondary-container": "#7bf8a1",
                    "on-surface-variant": "#3d4a3e",
                    "surface-container-low": "#f6f3f2",
                    "secondary-fixed": "#7efba4",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#ff9875",
                    "inverse-primary": "#4ae183",
                    "on-surface": "#1c1b1b",
                    "on-primary-container": "#005027",
                    "tertiary-fixed": "#ffdbd0",
                    "surface-container-high": "#ebe7e7",
                    "on-background": "#1c1b1b",
                    "inverse-surface": "#313030",
                    "primary-fixed": "#6bfe9c",
                    "error-container": "#ffdad6",
                    "on-primary-fixed": "#00210c",
                    "outline-variant": "#bbcbbb",
                    "secondary-fixed-dim": "#61de8a"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            backdrop-filter: blur(20px);
            background: rgba(252, 249, 248, 0.8);
        }
        .custom-shadow {
            box-shadow: 0px 20px 40px rgba(28, 27, 27, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center">
<!-- Header Section (Transactional - No Global Nav) -->
<header class="w-full max-w-md sticky top-0 z-50 bg-surface/90 backdrop-blur-md px-6 py-5 flex items-center justify-between">
<button class="w-10 h-10 flex items-center justify-start hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-on-surface text-2xl">close</span>
</button>
<h1 class="font-headline font-extrabold text-xl tracking-tight text-on-surface">Thêm giao dịch</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="w-full max-w-md flex-1 px-6 pb-32">
<!-- Large Amount Display Area -->
<section class="mt-8 mb-12 text-center">
<span class="font-label text-on-surface-variant text-sm uppercase tracking-widest font-semibold">Số tiền</span>
<div class="mt-4 flex items-baseline justify-center gap-2">
<span class="font-headline font-extrabold text-5xl text-primary tracking-tighter">1.250.000</span>
<span class="font-headline font-bold text-2xl text-primary-container">₫</span>
</div>
</section>
<!-- Bento Form Section -->
<div class="grid grid-cols-2 gap-4">
<!-- Category Selection - Horizontal Bleed Carousel Feel -->
<div class="col-span-2 overflow-x-auto pb-4 -mx-6 px-6 no-scrollbar">
<div class="flex gap-3 min-w-max">
<!-- Food Category (Selected) -->
<button class="flex flex-col items-center justify-center bg-primary-container/10 border border-primary/20 rounded-xl px-6 py-5 min-w-[96px] transition-all active:scale-95">
<div class="w-12 h-12 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="text-xs font-semibold text-on-primary-container font-label">Food</span>
</button>
<!-- Transport -->
<button class="flex flex-col items-center justify-center bg-surface-container-low rounded-xl px-6 py-5 min-w-[96px] transition-all hover:bg-surface-container-high active:scale-95">
<div class="w-12 h-12 bg-surface text-on-surface-variant rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined">directions_car</span>
</div>
<span class="text-xs font-medium text-on-surface-variant font-label">Transport</span>
</button>
<!-- Shopping -->
<button class="flex flex-col items-center justify-center bg-surface-container-low rounded-xl px-6 py-5 min-w-[96px] transition-all hover:bg-surface-container-high active:scale-95">
<div class="w-12 h-12 bg-surface text-on-surface-variant rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined">shopping_bag</span>
</div>
<span class="text-xs font-medium text-on-surface-variant font-label">Shopping</span>
</button>
<!-- Bills -->
<button class="flex flex-col items-center justify-center bg-surface-container-low rounded-xl px-6 py-5 min-w-[96px] transition-all hover:bg-surface-container-high active:scale-95">
<div class="w-12 h-12 bg-surface text-on-surface-variant rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined">receipt_long</span>
</div>
<span class="text-xs font-medium text-on-surface-variant font-label">Bills</span>
</button>
</div>
</div>
<!-- Date Input Card -->
<div class="col-span-1 bg-surface-container-low p-5 rounded-xl flex flex-col gap-2 group transition-all hover:bg-surface-container-high cursor-pointer">
<span class="font-label text-xs text-on-surface-variant font-medium uppercase tracking-wider">Ngày tháng</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">calendar_today</span>
<span class="font-headline font-bold text-on-surface">Hôm nay</span>
</div>
</div>
<!-- Note Input Card -->
<div class="col-span-1 bg-surface-container-low p-5 rounded-xl flex flex-col gap-2 group transition-all hover:bg-surface-container-high cursor-pointer">
<span class="font-label text-xs text-on-surface-variant font-medium uppercase tracking-wider">Ghi chú</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-outline-variant text-xl">edit_note</span>
<span class="text-on-surface-variant text-sm italic">Thêm...</span>
</div>
</div>
<!-- Visual Context Image (Aesthetic Tonal Element) -->
<div class="col-span-2 relative h-32 rounded-xl overflow-hidden mt-2">
<img class="w-full h-full object-cover" data-alt="Modern minimalist aesthetic overhead shot of green plants, organized workspace, and soft natural lighting to symbolize financial clarity" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDQ9YtmIgcINDhslyHyboZ4gi1L6SnBtpeG2Jtl8qB8kMN6ERSNuEWf7p_xlNzbZsw73W5KbdOie3J-7umM9K4pAEAb791hsP_qtTZynmvnoI9qRk4CD7o0SHW2WQF8b9Oz19FDNE683HFPHq5Z4XCKPbCM0r-gFK_28_JrD0SbiXhHSTlN2rToNH0w0RKEZE2hhOAdZMZmJuxn68VGZnDxLvrd8uwxaqX3BVvqriTciBq6n5ayigyhfZXGPZIsc9gmX2_Q-migh4xm"/>
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/40 to-transparent"></div>
<div class="absolute bottom-4 left-5">
<p class="text-white text-xs font-label opacity-90">Transaction Analysis</p>
<p class="text-white font-headline font-bold text-sm tracking-tight">Thêm chi tiết để tối ưu ngân sách</p>
</div>
</div>
</div>
</main>
<!-- Keypad & Add Button Overlay -->
<div class="fixed bottom-0 w-full max-w-md bg-surface p-6 pb-10 border-t border-surface-container shadow-[0px_-20px_40px_rgba(0,0,0,0.04)]">
<!-- Numeric Keypad -->
<div class="grid grid-cols-3 gap-2 mb-6">
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">1</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">2</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">3</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">4</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">5</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">6</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">7</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">8</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">9</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">.</button>
<button class="h-14 font-headline text-2xl font-bold text-on-surface hover:bg-surface-container-low rounded-xl transition-all active:scale-95">0</button>
<button class="h-14 flex items-center justify-center hover:bg-surface-container-low rounded-xl transition-all active:scale-95">
<span class="material-symbols-outlined text-outline">backspace</span>
</button>
</div>
<!-- Primary Action -->
<button class="w-full h-16 bg-gradient-to-b from-primary to-primary-container text-on-primary font-headline font-extrabold text-lg rounded-xl shadow-lg shadow-primary/20 flex items-center justify-center gap-3 transition-all active:scale-[0.98] active:shadow-none">
<span class="material-symbols-outlined">add_circle</span>
            Thêm chi tiêu
        </button>
</div>
</body></html>
