<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>VITALITY | Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error-container": "#93000a",
                        "on-primary-container": "#005027",
                        "on-primary-fixed": "#00210c",
                        "tertiary-fixed-dim": "#ffb59d",
                        "surface-container": "#f0edec",
                        "inverse-primary": "#4ae183",
                        "on-tertiary-container": "#772e14",
                        "on-surface": "#1c1b1b",
                        "primary-container": "#2ecc71",
                        "secondary": "#006d37",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#390c00",
                        "surface-container-highest": "#e5e2e1",
                        "primary": "#006d37",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#00210c",
                        "on-surface-variant": "#3d4a3e",
                        "primary-fixed": "#6bfe9c",
                        "surface-bright": "#fcf9f8",
                        "inverse-on-surface": "#f3f0ef",
                        "tertiary-fixed": "#ffdbd0",
                        "inverse-surface": "#313030",
                        "outline": "#6c7b6d",
                        "error": "#ba1a1a",
                        "surface-dim": "#dcd9d9",
                        "surface": "#fcf9f8",
                        "surface-tint": "#006d37",
                        "on-primary-fixed-variant": "#005228",
                        "surface-variant": "#e5e2e1",
                        "secondary-container": "#7bf8a1",
                        "on-background": "#1c1b1b",
                        "secondary-fixed": "#7efba4",
                        "on-tertiary-fixed-variant": "#793015",
                        "outline-variant": "#bbcbbb",
                        "surface-container-high": "#ebe7e7",
                        "tertiary": "#98472a",
                        "primary-fixed-dim": "#4ae183",
                        "on-secondary-fixed-variant": "#005228",
                        "on-secondary-container": "#007239",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#61de8a",
                        "tertiary-container": "#ff9875",
                        "surface-container-low": "#f6f3f2",
                        "background": "#fcf9f8",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-shift-no-border {
            background-color: #fcf9f8;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar Suppressed for Login according to Navigation Shell rules -->
<main class="min-h-screen flex flex-col px-8 py-12 max-w-md mx-auto">
<!-- Logo Section -->
<div class="flex flex-col items-center mt-12 mb-16">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-4xl text-on-surface" data-icon="bubble_chart">bubble_chart</span>
<h1 class="text-4xl font-headline font-black tracking-tighter text-on-surface">VITALITY</h1>
</div>
<p class="font-label text-sm uppercase tracking-widest text-on-surface-variant/60 font-medium">Precision Tracking</p>
</div>
<!-- Form Section -->
<form class="flex-grow space-y-8">
<div class="space-y-6">
<!-- Email Input -->
<div class="relative group">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-2 ml-1" for="email">Email</label>
<input class="w-full h-14 bg-surface-container-low border border-on-surface/10 rounded-xl px-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary-container focus:bg-surface-container-lowest transition-all outline-none" id="email" placeholder="name@vitality.com" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="flex justify-between items-end mb-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider ml-1" for="password">Password</label>
<a class="font-label text-xs font-bold text-primary-container hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
<input class="w-full h-14 bg-surface-container-low border border-on-surface/10 rounded-xl px-4 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-0 focus:border-primary-container focus:bg-surface-container-lowest transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Login Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-extrabold text-lg rounded-xl shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2" type="submit">
                Log In
                <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Sign Up Link -->
<div class="text-center pt-2">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-bold text-primary-container hover:underline decoration-2 underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</form>
<!-- Social Login Section -->
<div class="mt-auto pt-12">
<div class="flex items-center gap-4 mb-8">
<div class="h-[1px] flex-grow bg-on-surface/5"></div>
<span class="font-label text-[10px] uppercase tracking-[0.2em] text-on-surface-variant/50 font-bold">Or continue with</span>
<div class="h-[1px] flex-grow bg-on-surface/5"></div>
</div>
<div class="flex justify-center gap-6 pb-4">
<!-- Google Login -->
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-90 duration-200 grayscale opacity-80 hover:grayscale-0 hover:opacity-100">
<img alt="Google" class="w-6 h-6" data-alt="minimalist google logo icon for single sign-on authentication in high-end mobile application interface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8bnNZcLIKSkcyzvfOz7AWVCBVuMaPXHWZYpZNCqN4DWtYRw0S4ExNbw0HNaR-TIJVfTtUCWl1VPQnx_TjG1biivSCN4bOZZJTfog0I-t9qmQCReEB0xRC7cEcY8GyDF6EL_9ujm21OeL3XLWcgW0hx-FbksuXaQT91ONVO2DzBMOYwvtcKDcluK-YeP2x-PtS0MsCafXgxZXLq6dDx7aJj4Lc8nQPWfb8K2xQ2Pzjuk5dYDO3SSKUntDCManLgRSZD2v2nWwrXMES"/>
</button>
<!-- Apple Login -->
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-90 duration-200 grayscale opacity-80 hover:grayscale-0 hover:opacity-100">
<span class="material-symbols-outlined text-2xl text-on-surface" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
</button>
<!-- Biometric Login (Contextual Addition) -->
<button class="w-14 h-14 rounded-full bg-surface-container-high flex items-center justify-center hover:bg-surface-container-highest transition-colors active:scale-90 duration-200 grayscale opacity-80 hover:grayscale-0 hover:opacity-100">
<span class="material-symbols-outlined text-2xl text-on-surface" data-icon="fingerprint">fingerprint</span>
</button>
</div>
</div>
<!-- Decorative Background Element -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/5 rounded-full blur-[100px] -mr-32 -mt-32"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-secondary/5 rounded-full blur-[120px] -ml-48 -mb-48"></div>
</main>
<!-- Navigation suppressed according to "Shell Visibility & Relevance" rule: suppress on Login/Onboarding screens -->
</body></html>
