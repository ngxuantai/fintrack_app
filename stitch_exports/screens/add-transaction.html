<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f9f9f9",
                        "secondary-fixed-dim": "#ababab",
                        "inverse-on-surface": "#f1f1f1",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "on-background": "#1b1b1b",
                        "surface": "#f9f9f9",
                        "outline-variant": "#c6c6c6",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#ffffff",
                        "tertiary-fixed-dim": "#474747",
                        "on-tertiary-fixed-variant": "#e2e2e2",
                        "primary-fixed": "#5e5e5e",
                        "on-error-container": "#410002",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "surface-container-high": "#e8e8e8",
                        "on-primary-container": "#ffffff",
                        "outline": "#777777",
                        "surface-container": "#eeeeee",
                        "on-secondary-fixed-variant": "#3b3b3b",
                        "inverse-primary": "#c6c6c6",
                        "secondary-fixed": "#c6c6c6",
                        "on-tertiary": "#e2e2e2",
                        "surface-dim": "#dadada",
                        "on-surface-variant": "#474747",
                        "primary": "#000000",
                        "surface-variant": "#e2e2e2",
                        "surface-container-highest": "#e2e2e2",
                        "inverse-surface": "#303030",
                        "on-tertiary-container": "#ffffff",
                        "secondary-container": "#d4d4d4",
                        "on-secondary-container": "#1b1b1b",
                        "tertiary": "#3b3b3b",
                        "on-surface": "#1b1b1b",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed": "#ffffff",
                        "tertiary-fixed": "#5e5e5e",
                        "primary-container": "#3b3b3b",
                        "tertiary-container": "#747474",
                        "surface-tint": "#5e5e5e",
                        "on-primary": "#e2e2e2",
                        "on-secondary-fixed": "#1b1b1b",
                        "primary-fixed-dim": "#474747",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f9f9f9",
                        "secondary": "#5e5e5e",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .font-manrope { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased">
<!-- TopAppBar: Glassmorphic & Fixed -->
<!-- Content: Add Transaction screen (Linear task flow). Shared shell logic: No Nav Bar on sub-pages with "Close" or "Back". -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-black/80 backdrop-blur-xl">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-2xl mx-auto">
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity active:scale-95">
<span class="material-symbols-outlined text-black dark:text-white">close</span>
</button>
<h1 class="font-manrope font-extrabold text-lg tracking-tight text-black dark:text-white">Thêm giao dịch</h1>
</div>
<div class="flex items-center">
<span class="material-symbols-outlined text-neutral-400">help_outline</span>
</div>
</div>
</header>
<main class="pt-24 pb-12 px-6 max-w-2xl mx-auto min-h-screen flex flex-col">
<!-- Input Amount Section (The "Vault" focus) -->
<div class="mb-10 text-center">
<label class="font-label text-[10px] font-medium uppercase tracking-widest text-neutral-400 mb-2 block">Số tiền</label>
<div class="flex items-baseline justify-center gap-2">
<span class="font-manrope text-2xl font-bold">đ</span>
<span class="font-manrope text-5xl font-black tracking-tighter text-primary">0</span>
</div>
</div>
<!-- Form Details -->
<div class="space-y-8 flex-grow">
<!-- Category Selection: Mono Grid -->
<section>
<div class="flex justify-between items-center mb-4">
<h2 class="font-manrope font-bold text-sm tracking-tight">Danh mục</h2>
<button class="font-label text-[10px] font-medium uppercase tracking-widest text-neutral-400">Xem tất cả</button>
</div>
<div class="grid grid-cols-4 gap-4">
<div class="flex flex-col items-center gap-2">
<div class="w-14 h-14 rounded-xl bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-label text-[11px] font-medium text-primary">Food</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-14 h-14 rounded-xl bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary">directions_car</span>
</div>
<span class="font-label text-[11px] font-medium text-neutral-600">Transport</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-14 h-14 rounded-xl bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary">shopping_bag</span>
</div>
<span class="font-label text-[11px] font-medium text-neutral-600">Shopping</span>
</div>
<div class="flex flex-col items-center gap-2 opacity-40">
<div class="w-14 h-14 rounded-xl bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary">receipt_long</span>
</div>
<span class="font-label text-[11px] font-medium text-neutral-600">Bills</span>
</div>
</div>
</section>
<!-- Metadata Inputs -->
<div class="space-y-6">
<!-- Date Picker -->
<div class="group border-b border-neutral-200 py-2 focus-within:border-black transition-colors">
<label class="font-label text-[10px] font-medium uppercase tracking-widest text-neutral-400 block mb-1">Ngày tháng</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-neutral-500 text-lg">calendar_today</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body font-medium text-on-surface" readonly="" type="text" value="Hôm nay, 24 Tháng 5"/>
</div>
</div>
<!-- Notes Input -->
<div class="group border-b border-neutral-200 py-2 focus-within:border-black transition-colors">
<label class="font-label text-[10px] font-medium uppercase tracking-widest text-neutral-400 block mb-1">Ghi chú</label>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-neutral-500 text-lg">notes</span>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 font-body font-medium text-on-surface placeholder:text-neutral-300" placeholder="Thêm mô tả..." type="text"/>
</div>
</div>
</div>
</div>
<!-- Custom Number Pad (Architectural Grid) -->
<div class="mt-12 bg-surface-container-low rounded-t-[2rem] -mx-6 p-8">
<div class="grid grid-cols-3 gap-y-6 text-center">
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">1</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">2</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">3</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">4</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">5</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">6</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">7</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">8</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">9</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">.</button>
<button class="font-manrope text-2xl font-bold py-4 active:scale-90 transition-transform">0</button>
<button class="font-manrope text-2xl font-bold py-4 flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
<!-- Main CTA -->
<div class="mt-8">
<button class="w-full h-16 bg-primary text-on-primary rounded-xl font-manrope font-bold text-base tracking-tight hover:opacity-90 active:scale-95 transition-all shadow-lg shadow-black/5">
                    Thêm
                </button>
</div>
</div>
</main>
<!-- Shell Suppression Check: Task-focused screen, back/close actions present. Navigation and FAB are suppressed. -->
</body></html>
